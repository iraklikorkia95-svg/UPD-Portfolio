<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg: #fff;
    --ink: #282828;
    --muted: #8a8a8a;
    --line: #ececec;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    min-height: 100vh;
    overflow-x: hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: "Satoshi", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
}

a,
button {
    color: inherit;
    font: inherit;
}

a {
    text-decoration: none;
}

button {
    border: 0;
    background: none;
    cursor: pointer;
}

.site-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 20;
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 70px;
    padding: 23px 5%;
    background: rgba(255, 255, 255, 0.96);
}

.corner-name {
    color: var(--ink);
    font-size: 20px;
    font-weight: 900;
    line-height: 24px;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(-10px);
    transition: opacity 0.45s ease, transform 0.45s ease;
}

body.name-docked .corner-name {
    opacity: 1;
    transform: translateY(0);
}

.nav {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: flex-end;
    margin-left: auto;
}

.nav a,
.portfolio-trigger {
    padding-right: 20px;
    color: var(--ink);
    background: transparent;
    border: 0;
    font-family: inherit;
    font-size: 20px;
    font-weight: 400;
    line-height: 24px;
    cursor: pointer;
}

.nav a:hover,
.nav a.active,
.portfolio-trigger:hover,
.nav-item:focus-within .portfolio-trigger,
.nav-item:hover .portfolio-trigger {
    font-weight: 700;
}

.nav-item {
    position: relative;
}

.album-dropdown {
    position: absolute;
    top: calc(100% + 12px);
    right: 20px;
    min-width: 180px;
    padding: 12px 0;
    background: #fff;
    box-shadow: 0 10px 34px rgba(0, 0, 0, 0.09);
    opacity: 0;
    visibility: hidden;
    transform: translateY(-6px);
    transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s ease;
}

.nav-item:hover .album-dropdown,
.nav-item:focus-within .album-dropdown {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.album-dropdown a {
    display: block;
    padding: 8px 16px;
    font-size: 17px;
    line-height: 22px;
    white-space: nowrap;
    transition: background-color 0.22s ease, color 0.22s ease, padding-left 0.22s ease, font-weight 0.22s ease;
}

.album-dropdown a:hover,
.album-dropdown a:focus {
    background: rgba(40, 40, 40, 0.04);
    padding-left: 22px;
    font-weight: 700;
}

.masthead {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 255px;
    padding: 124px 5% 48px;
    text-align: center;
}

.masthead h1 {
    color: var(--ink);
    font-size: clamp(2rem, 7vw, 70px);
    font-weight: 900;
    line-height: 1;
    text-transform: uppercase;
    transform-origin: center;
    transition: opacity 0.45s ease, transform 0.45s ease;
}

body.name-docked .masthead h1 {
    opacity: 0;
    transform: translate(-34vw, -84px) scale(0.34);
}

.masthead p {
    margin-top: 11px;
    color: var(--muted);
    font-size: clamp(0.95rem, 2.3vw, 24px);
    font-weight: 400;
    line-height: 1.18;
    text-transform: uppercase;
}

.site-container {
    max-width: 1480px;
    margin: 0 auto;
    padding-bottom: 70px;
}

.album-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 28px;
    padding: 40px 3vw 0;
}

.photo-button {
    display: block;
    width: 100%;
    text-align: left;
}

.photo-frame {
    position: relative;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 4px 20px rgba(62, 48, 26, 0.08);
    padding: 12px;
}

.photo-frame::before {
    content: "";
    display: block;
    padding-bottom: 104%;
}

.photo-frame img {
    position: absolute;
    inset: 12px;
    width: calc(100% - 24px);
    height: calc(100% - 24px);
    object-fit: contain;
    background: #fff;
    transform: scale(1);
    transition: transform 0.45s ease;
}

.photo-button:hover .photo-frame img {
    transform: scale(1.045);
}

.lightbox {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    background: #fff;
}

.lightbox.active {
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
}

.lightbox-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    padding: 18px 5%;
    border-bottom: 1px solid var(--line);
}

.lightbox-title,
.lightbox-close {
    color: var(--ink);
    font-size: 20px;
    font-weight: 700;
    line-height: 24px;
}

.lightbox-close {
    font-size: 30px;
    line-height: 30px;
}

.lightbox-body {
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 280px;
    gap: 26px;
    padding: 24px 5%;
}

.lightbox-stage {
    position: relative;
    min-width: 0;
    min-height: 0;
    display: flex;
    justify-content: center;
    align-items: center;
}

.lightbox-stage img {
    max-width: 100%;
    max-height: calc(100vh - 150px);
    object-fit: contain;
}

.side-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.78);
    color: var(--ink);
    font-size: 34px;
    line-height: 46px;
    text-align: center;
}

.side-btn:hover {
    background: #fff;
}

.prev {
    left: 8px;
}

.next {
    right: 8px;
}

.metadata-panel {
    align-self: center;
    border-left: 1px solid var(--line);
    padding-left: 26px;
}

.metadata-panel h2 {
    margin-bottom: 16px;
    font-size: 20px;
    font-weight: 700;
    line-height: 24px;
}

.meta-list {
    display: grid;
    gap: 10px;
}

.meta-row {
    display: grid;
    grid-template-columns: 90px minmax(0, 1fr);
    gap: 14px;
    color: var(--ink);
    font-size: 15px;
    line-height: 20px;
}

.meta-label {
    color: var(--muted);
}

@media (max-width: 932px) {
    .site-header {
        position: fixed;
        min-height: auto;
        padding: 18px 5%;
    }

    .corner-name,
    .nav a,
    .portfolio-trigger {
        font-size: 18px;
        line-height: 22px;
    }

    .album-dropdown {
        right: 14px;
    }

    .masthead {
        min-height: 210px;
        padding: 96px 5% 30px;
    }

    .album-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 22px;
        padding-top: 30px;
    }

    .lightbox-body {
        grid-template-columns: 1fr;
        overflow: auto;
    }

    .lightbox-stage img {
        max-height: 68vh;
    }

    .metadata-panel {
        align-self: stretch;
        border-left: 0;
        border-top: 1px solid var(--line);
        padding: 20px 0 0;
    }
}

@media (max-width: 540px) {
    .site-header {
        align-items: flex-start;
        padding: 14px 5%;
    }

    .nav {
        row-gap: 8px;
    }

    .corner-name,
    .nav a,
    .portfolio-trigger {
        padding-right: 13px;
        font-size: 16px;
        line-height: 20px;
    }

    .corner-name {
        max-width: 116px;
    }

    .masthead h1 {
        font-size: 30px;
        line-height: 30px;
    }

    .masthead p {
        font-size: 15px;
        line-height: 18px;
        margin-top: 8px;
    }

    .album-grid {
        grid-template-columns: 1fr;
        gap: 14px;
        padding-top: 26px;
    }

    .lightbox-bar {
        padding: 14px 5%;
    }

    .lightbox-title {
        font-size: 16px;
    }

    .lightbox-body {
        padding: 16px 5%;
    }

    .side-btn {
        width: 38px;
        height: 38px;
        font-size: 28px;
        line-height: 38px;
    }
}
</style>
</head>

const META_LABELS = ["Camera", "ISO", "Shutter", "Aperture", "Focal", "Size"];
const params = new URLSearchParams(window.location.search);
const slug = params.get("album") || "strasbourg";
const album = ALBUMS[slug] || ALBUMS.strasbourg;
let photos = [];
let currentIndex = 0;

function makePhoto(album, number) {
    const ext = typeof album.ext === "function" ? album.ext(number) : album.ext;
    return {
        number,
        src: `${album.dir}/${album.prefix}${number}.${ext}`,
        meta: album.meta[number] || []
    };
}

function initAlbum() {
    photos = Array.from({ length: album.count }, (_, index) => makePhoto(album, index + 1));
    document.title = `${album.title} - Irakli Korkia`;
    document.getElementById("albumTitle").textContent = album.title;
    document.getElementById("cornerAlbumTitle").textContent = album.title;
    document.getElementById("albumCount").textContent = `${album.count} photographs`;

    const grid = document.getElementById("albumGrid");
    grid.innerHTML = "";
    photos.forEach((photo, index) => {
        const button = document.createElement("button");
        button.className = "photo-button";
        button.type = "button";
        button.setAttribute("aria-label", `Open ${album.title} photo ${photo.number}`);
        button.innerHTML = `
            <div class="photo-frame">
                <img src="${photo.src}" alt="${album.title} photo ${photo.number}" loading="lazy">
            </div>
        `;
        button.addEventListener("click", () => openLightbox(index));
        grid.appendChild(button);
    });
}

function renderMetadata(photo) {
    const list = document.getElementById("metadataList");
    list.innerHTML = META_LABELS.map((label, index) => `
        <div class="meta-row">
            <div class="meta-label">${label}</div>
            <div>${photo.meta[index] || "Not available"}</div>
        </div>
    `).join("");
}

function displayPhoto(index) {
    currentIndex = (index + photos.length) % photos.length;
    const photo = photos[currentIndex];
    const image = document.getElementById("lightboxImage");
    image.src = photo.src;
    image.alt = `${album.title} photo ${photo.number}`;
    document.getElementById("lightboxTitle").textContent = `${album.title} / ${String(photo.number).padStart(2, "0")}`;
    renderMetadata(photo);
}

function openLightbox(index) {
    displayPhoto(index);
    document.getElementById("lightbox").classList.add("active");
    document.getElementById("lightbox").setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
}

function closeLightbox() {
    document.getElementById("lightbox").classList.remove("active");
    document.getElementById("lightbox").setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
}

function nextPhoto() {
    displayPhoto(currentIndex + 1);
}

function previousPhoto() {
    displayPhoto(currentIndex - 1);
}

document.getElementById("lightbox").addEventListener("click", (event) => {
    const target = event.target instanceof Element ? event.target : event.target.parentElement;
    if (target && target.closest(".lightbox-stage img, .side-btn, .metadata-panel, .lightbox-close")) return;
    closeLightbox();
});

document.addEventListener("keydown", (event) => {
    if (!document.getElementById("lightbox").classList.contains("active")) return;
    if (event.key === "Escape") closeLightbox();
    if (event.key === "ArrowRight") nextPhoto();
    if (event.key === "ArrowLeft") previousPhoto();
});

initAlbum();

const updateNameDock = () => {
    document.body.classList.toggle("name-docked", window.scrollY > 80);
};

updateNameDock();
window.addEventListener("scroll", updateNameDock, { passive: true });
