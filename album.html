* {

body {

a,
button {

a {

button {

    cursor: pointer;

.site-header {
    position: fixed;

    right: 0;

    justify-content: space-between;
    align-items: center;
    gap: 18px;

}

.corner-album {
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.45s ease;
}

body.name-docked .corner-album {

}

.nav {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: flex-end;

}

.nav a,
.portfolio-trigger {
    padding-right: 20px;
    color: var(--ink);
    background: transparent;
    border: 0;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    line-height: 20px;
    text-transform: uppercase;
    cursor: pointer;
}

.nav a:hover,
.nav a.active,
.portfolio-trigger:hover,
.nav-item:focus-within .portfolio-trigger,
.nav-item:hover .portfolio-trigger {
    color: var(--accent-warm);

}

.nav-item {
    position: relative;
}

.album-dropdown {
    position: absolute;
    top: calc(100% + 12px);
    right: 20px;

    min-width: 180px;
    padding: 12px 0;
    background: var(--surface);

    visibility: hidden;

}

.nav-item:hover .album-dropdown,
.nav-item:focus-within .album-dropdown,
.nav-item.menu-open .album-dropdown {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.album-dropdown a {
    display: block;

    font-weight: 500;

.album-dropdown a:hover,
.album-dropdown a:focus {
    background: var(--hover);

}

.masthead {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 255px;

}

.masthead h1 {

    font-weight: 700;
    line-height: 1;
    text-transform: uppercase;
    transform-origin: center;
    transition: opacity 0.45s ease, transform 0.45s ease;
}

body.name-docked .masthead h1 {
    opacity: 0;
    transform: translate(-34vw, -84px) scale(0.34);
}

.masthead p {
    margin-top: 11px;

    line-height: 1.18;
    text-transform: uppercase;
}

.site-container {
    max-width: 1480px;
    margin: 0 auto;
    padding-bottom: 70px;

.album-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));

    padding: 40px 3vw 0;
}

.photo-button {

}

.photo-frame {
    position: relative;
    overflow: hidden;
    background: var(--photo-mat);
    box-shadow: 0 14px 34px rgba(38, 35, 31, 0.12);
    padding: 12px;
}

.photo-frame::before {
    content: "";
    display: block;
    padding-bottom: 104%;
}

.photo-frame img {
    position: absolute;
    inset: 12px;
    width: calc(100% - 24px);
    height: calc(100% - 24px);
    object-fit: contain;
    background: var(--photo-mat);
    filter: saturate(0.96) contrast(1.02);
    transform: scale(1);
    transition: filter 0.45s ease, transform 0.45s ease;
}

.photo-button:hover .photo-frame img {
    filter: saturate(1.03) contrast(1.04);
    transform: scale(1.026);
}

.lightbox {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    background: var(--bg);
}

.lightbox.active {
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
}

.lightbox-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    padding: 18px 5%;
    border-bottom: 1px solid var(--line);
    background: rgba(233, 227, 215, 0.93);
    backdrop-filter: blur(14px);
}

.lightbox-title,
.lightbox-tool,
.lightbox-close {
    color: var(--ink);
    font-size: 15px;
    font-weight: 700;
    line-height: 20px;
    text-transform: uppercase;
}

.lightbox-actions {
    display: flex;
    align-items: center;
    gap: 16px;
}

.lightbox-tool {
    position: relative;
    width: 28px;
    height: 28px;
    border: 1px solid currentColor;
    border-radius: 50%;
    line-height: 26px;
    text-align: center;
}

.lightbox-tool::before {
    content: "";
    position: absolute;
    top: 7px;
    left: 7px;
    width: 9px;
    height: 9px;
    border: 1.5px solid currentColor;
    border-radius: 50%;
}

.lightbox-tool::after {
    content: "";
    position: absolute;
    top: 17px;
    left: 17px;
    width: 7px;
    border-top: 1.5px solid currentColor;
    transform: rotate(45deg);
    transform-origin: left center;
}

.lightbox-tool[aria-pressed="true"] {
    color: var(--accent);
}

.lightbox-tool:hover,
.lightbox-close:hover {
    color: var(--accent-warm);
}

.lightbox-close {
    font-size: 30px;
    line-height: 30px;
}

.lightbox-body {
    min-height: 0;
    display: grid;
    grid-template-columns: minmax(0, 1fr) 210px;
    gap: 16px;
    padding: 24px 5%;
}

.lightbox.no-metadata .lightbox-body {
    grid-template-columns: minmax(0, 1fr);
}

.lightbox-stage {
    position: relative;
    min-width: 0;
    min-height: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: auto;
}

.lightbox-stage img {

    transform-origin: center center;
    transition: transform 0.28s cubic-bezier(0.215, 0.61, 0.355, 1);
    cursor: zoom-in;
}

.lightbox.zoomed .lightbox-stage {
    align-items: center;
}

.lightbox.zoomed .lightbox-stage img {
    transform: scale(2);
    cursor: zoom-out;
}

.side-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 46px;
    height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(247, 243, 236, 0.84);
    color: var(--ink);
    font-size: 0;
    line-height: 1;
    text-align: center;
}

.side-btn::before {
    content: "";
    width: 12px;
    height: 12px;
    border-top: 2px solid currentColor;
    border-right: 2px solid currentColor;
}

.prev::before {
    transform: rotate(-135deg);
}

.next::before {
    transform: rotate(45deg);
}

.side-btn:hover {
    background: var(--surface);
    color: var(--accent-warm);
}

.prev {
    left: 8px;
}

.next {
    right: 8px;
}

.metadata-panel {

    line-height: 22px;

.meta-list {

}

.meta-row {

    grid-template-columns: 68px minmax(0, 1fr);

    font-size: 12px;
    line-height: 18px;

.meta-label {
    color: var(--muted);

@media (max-width: 932px) {

<body>
<header class="site-header">
    <a href="index.html" class="corner-name" aria-label="Back to portfolio">
        <span>IRAKLI KORKIA</span>
        <span class="corner-album" id="cornerAlbumTitle"></span>
    </a>
    <nav class="nav" aria-label="Main navigation">
        <div class="nav-item">
            <button class="portfolio-trigger" type="button" aria-haspopup="true" aria-expanded="false">Portfolio</button>
            <div class="album-dropdown" aria-label="Album navigation">
                <a href="album.html?album=andalusia">ANDALUSIA</a>
                <a href="album.html?album=catalonia">CATALONIA</a>
                <a href="album.html?album=corsica">CORSICA</a>

                <a href="album.html?album=strasbourg">STRASBOURG</a>
            </div>
        </div>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="masthead" aria-label="Album masthead">
    <div>
        <h1 id="albumTitle">Album</h1>
        <p id="albumCount">Photographs</p>
    </div>
</section>

<main class="site-container">
    <section class="album-grid" id="albumGrid" aria-label="Album photographs"></section>
</main>

<div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightbox-bar">
        <div class="lightbox-title" id="lightboxTitle"></div>
        <div class="lightbox-actions">
            <button class="lightbox-tool" id="zoomToggle" type="button" onclick="toggleZoom()" aria-label="Zoom in" aria-pressed="false"></button>
            <button class="lightbox-close" type="button" onclick="closeLightbox()" aria-label="Close photo">&times;</button>
        </div>
    </div>
    <div class="lightbox-body">
        <div class="lightbox-stage">
            <button class="side-btn prev" type="button" onclick="previousPhoto()" aria-label="Previous photo">&#8249;</button>
            <img id="lightboxImage" src="" alt="">
            <button class="side-btn next" type="button" onclick="nextPhoto()" aria-label="Next photo">&#8250;</button>
        </div>
        <aside class="metadata-panel" aria-label="Photo metadata">
            <h2>Metadata</h2>
            <div class="meta-list" id="metadataList"></div>
        </aside>
    </div>

<script>
const ALBUMS = {
    "strasbourg": {
        title: "Strasbourg",
        dir: "Photos/Strasbourg",
        prefix: "Strasbourg_",
        ext: (n) => n >= 15 && n <= 19 || n === 21 || n === 23 || n >= 26 ? "JPG" : "jpg",
        count: 28,

const META_LABELS = ["Camera", "ISO", "Shutter", "Aperture", "Focal", "Size"];
const params = new URLSearchParams(window.location.search);
const slug = params.get("album") || "strasbourg";
const album = ALBUMS[slug] || ALBUMS.strasbourg;
let photos = [];
let currentIndex = 0;
let albumTouchStartX = 0;
let albumTouchStartY = 0;
let albumTouchStartIndex = 0;

function isMobileViewport() {
    return window.matchMedia("(max-width: 45em), (hover: none), (pointer: coarse)").matches;
}

function makePhoto(album, number) {
    if (album.fileOverrides && album.fileOverrides[number]) {
        return {
            number,
            src: `${album.dir}/${album.fileOverrides[number]}`,
            meta: album.meta[number] || []
        };
    }

    const ext = typeof album.ext === "function" ? album.ext(number) : album.ext;
    return {
        number,
        src: `${album.dir}/${album.prefix}${number}.${ext}`,
        meta: album.meta[number] || []
    };
}

function initAlbum() {
    photos = Array.from({ length: album.count }, (_, index) => makePhoto(album, index + 1));
    document.title = `${album.title} - IRAKLI KORKIA`;
    document.getElementById("albumTitle").textContent = album.title;
    document.getElementById("cornerAlbumTitle").textContent = `- ${album.title}`;
    document.getElementById("albumCount").textContent = `${album.count} photographs`;

    const grid = document.getElementById("albumGrid");
    grid.innerHTML = "";
    photos.forEach((photo, index) => {
        const button = document.createElement("button");
        button.className = "photo-button";
        button.type = "button";
        button.dataset.photoIndex = String(index);
        button.setAttribute("aria-label", `Open ${album.title} photo ${photo.number}`);
        button.innerHTML = `
            <div class="photo-frame">
                <img src="${photo.src}" alt="${album.title} photo ${photo.number}" loading="lazy">
            </div>
        `;
        button.querySelector("img").addEventListener("click", (event) => {
            event.stopPropagation();
            openLightbox(index);
        });
        grid.appendChild(button);
    });
}

function renderMetadata(photo) {
    const lightbox = document.getElementById("lightbox");
    const panel = document.querySelector(".metadata-panel");
    const list = document.getElementById("metadataList");
    const availableMeta = META_LABELS.map((label, index) => ({
        label,
        value: photo.meta[index]
    })).filter((item) => item.value);

    const hasMetadata = availableMeta.length > 0;
    lightbox.classList.toggle("no-metadata", !hasMetadata);
    panel.hidden = !hasMetadata;
    list.innerHTML = availableMeta.map((item) => `
        <div class="meta-row">
            <div class="meta-label">${item.label}</div>
            <div>${item.value}</div>
        </div>
    `).join("");
}

function displayPhoto(index) {
    currentIndex = (index + photos.length) % photos.length;
    const photo = photos[currentIndex];
    const image = document.getElementById("lightboxImage");
    setZoom(false);
    image.src = photo.src;
    image.alt = `${album.title} photo ${photo.number}`;
    document.getElementById("lightboxTitle").textContent = `${album.title} / ${String(photo.number).padStart(2, "0")}`;
    renderMetadata(photo);
}

function openLightbox(index) {
    displayPhoto(index);
    if (isMobileViewport()) setZoom(false);
    document.getElementById("lightbox").classList.add("active");
    document.getElementById("lightbox").setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
}

function closeLightbox() {
    setZoom(false);
    document.getElementById("lightbox").classList.remove("active");
    document.getElementById("lightbox").setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
}

function nextPhoto() {
    displayPhoto(currentIndex + 1);
}

function previousPhoto() {
    displayPhoto(currentIndex - 1);
}

function setZoom(isZoomed) {
    const lightbox = document.getElementById("lightbox");
    const zoomToggle = document.getElementById("zoomToggle");
    const image = document.getElementById("lightboxImage");
    lightbox.classList.toggle("zoomed", isZoomed);
    if (!isZoomed) image.style.transformOrigin = "center center";
    zoomToggle.setAttribute("aria-pressed", String(isZoomed));
    zoomToggle.setAttribute("aria-label", isZoomed ? "Zoom out" : "Zoom in");
}

function setZoomOriginFromEvent(event) {
    const image = document.getElementById("lightboxImage");
    const rect = image.getBoundingClientRect();
    const x = ((event.clientX - rect.left) / rect.width) * 100;
    const y = ((event.clientY - rect.top) / rect.height) * 100;
    image.style.transformOrigin = `${Math.max(0, Math.min(100, x))}% ${Math.max(0, Math.min(100, y))}%`;
}

function followZoomCursor(event) {
    if (!document.getElementById("lightbox").classList.contains("zoomed")) return;
    setZoomOriginFromEvent(event);
}

function toggleZoom(event) {
    if (isMobileViewport()) return;

    const lightbox = document.getElementById("lightbox");
    const shouldZoom = !lightbox.classList.contains("zoomed");
    if (shouldZoom && event) setZoomOriginFromEvent(event);
    setZoom(shouldZoom);
}

const scrollState = {
    activeIndex: 0,
    direction: 0,
    locked: false,
    wheelTotal: 0,
    wheelTimer: 0
};

const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const lockDuration = 900;
const wheelGestureThreshold = 95;

function getPhotoButtons() {
    return Array.from(document.querySelectorAll(".photo-button"));
}

function getNearestPhotoIndex() {
    const buttons = getPhotoButtons();
    if (!buttons.length) return 0;

    const viewportAnchor = window.innerHeight * 0.48;
    let nearestIndex = 0;
    let nearestDistance = Infinity;

    buttons.forEach((button, index) => {
        const rect = button.getBoundingClientRect();
        const distance = Math.abs(rect.top + rect.height / 2 - viewportAnchor);
        if (distance < nearestDistance) {
            nearestDistance = distance;
            nearestIndex = index;
        }
    });

    return nearestIndex;
}

function scrollToPhoto(index) {
    const buttons = getPhotoButtons();
    const target = buttons[index];
    if (!target) return;

    scrollState.activeIndex = index;
    scrollState.locked = true;

    window.scrollTo({
        top: target.getBoundingClientRect().top + window.scrollY,
        behavior: prefersReducedMotion ? "auto" : "smooth"
    });

    window.setTimeout(() => {
        scrollState.locked = false;
        scrollState.wheelTotal = 0;
    }, prefersReducedMotion ? 120 : lockDuration);
}

function handleAlbumWheel(event) {
    if (event.ctrlKey || document.getElementById("lightbox").classList.contains("active")) return;

    const buttons = getPhotoButtons();
    if (!buttons.length) return;

    const direction = Math.sign(event.deltaY);
    if (!direction) return;

    const albumRect = document.getElementById("albumGrid").getBoundingClientRect();
    const isPastAlbum = albumRect.bottom < 0 || albumRect.top > window.innerHeight;
    if (isPastAlbum) return;

    event.preventDefault();

    if (scrollState.locked) return;

    if (scrollState.direction !== direction) {
        scrollState.wheelTotal = 0;
        scrollState.direction = direction;
    }

    scrollState.wheelTotal += Math.min(Math.abs(event.deltaY), 40);
    window.clearTimeout(scrollState.wheelTimer);
    scrollState.wheelTimer = window.setTimeout(() => {
        scrollState.wheelTotal = 0;
    }, 220);

    if (scrollState.wheelTotal < wheelGestureThreshold) return;

    scrollState.wheelTotal = 0;

    const activeIndex = getNearestPhotoIndex();
    const nextIndex = Math.max(0, Math.min(buttons.length - 1, activeIndex + direction));
    if (nextIndex === activeIndex) {
        return;
    }

    scrollToPhoto(nextIndex);
}

function handleAlbumKeydown(event) {
    if (document.getElementById("lightbox").classList.contains("active")) {
        if (event.key === "Escape") closeLightbox();
        if (event.key === "ArrowRight") nextPhoto();
        if (event.key === "ArrowLeft") previousPhoto();
        if (event.key.toLowerCase() === "z") toggleZoom();
        return;
    }

    if (event.key !== "ArrowDown" && event.key !== "ArrowUp") return;

    const buttons = getPhotoButtons();
    if (!buttons.length) return;

    event.preventDefault();

    const direction = event.key === "ArrowDown" ? 1 : -1;
    const activeIndex = getNearestPhotoIndex();
    const nextIndex = Math.max(0, Math.min(buttons.length - 1, activeIndex + direction));
    scrollToPhoto(nextIndex);
}

function handleAlbumTouchStart(event) {
    if (!isMobileViewport() || document.getElementById("lightbox").classList.contains("active") || event.touches.length !== 1) return;

    albumTouchStartX = event.touches[0].clientX;
    albumTouchStartY = event.touches[0].clientY;
    albumTouchStartIndex = getNearestPhotoIndex();
}

function handleAlbumTouchEnd(event) {
    if (!isMobileViewport() || document.getElementById("lightbox").classList.contains("active") || !albumTouchStartY || !event.changedTouches.length) return;

    const deltaX = event.changedTouches[0].clientX - albumTouchStartX;
    const deltaY = event.changedTouches[0].clientY - albumTouchStartY;
    albumTouchStartX = 0;
    albumTouchStartY = 0;

    if (Math.abs(deltaY) < 48 || Math.abs(deltaY) < Math.abs(deltaX) * 1.2) return;

    const buttons = getPhotoButtons();
    const direction = deltaY < 0 ? 1 : -1;
    const nextIndex = Math.max(0, Math.min(buttons.length - 1, albumTouchStartIndex + direction));
    scrollToPhoto(nextIndex);
}

function handleAlbumTouchMove(event) {
    if (!isMobileViewport() || document.getElementById("lightbox").classList.contains("active") || !albumTouchStartY || !event.touches.length) return;

    const deltaX = event.touches[0].clientX - albumTouchStartX;
    const deltaY = event.touches[0].clientY - albumTouchStartY;
    if (Math.abs(deltaY) > 12 && Math.abs(deltaY) > Math.abs(deltaX)) {
        event.preventDefault();
    }
}

document.getElementById("lightbox").addEventListener("click", (event) => {
    const target = event.target instanceof Element ? event.target : event.target.parentElement;
    if (target && target.closest(".lightbox-stage img")) {
        event.preventDefault();
        if (isMobileViewport()) {
            const image = document.getElementById("lightboxImage");
            const rect = image.getBoundingClientRect();
            if (event.clientX >= rect.left + rect.width / 2) {
                nextPhoto();
            } else {
                previousPhoto();
            }
            return;
        }
        toggleZoom(event);
        return;
    }
    if (target && target.closest(".side-btn, .metadata-panel, .lightbox-tool, .lightbox-close")) return;
    closeLightbox();
});

document.addEventListener("keydown", handleAlbumKeydown);

initAlbum();
window.addEventListener("wheel", handleAlbumWheel, { passive: false });
document.getElementById("albumGrid").addEventListener("touchstart", handleAlbumTouchStart, { passive: true });
document.getElementById("albumGrid").addEventListener("touchmove", handleAlbumTouchMove, { passive: false });
document.getElementById("albumGrid").addEventListener("touchend", handleAlbumTouchEnd, { passive: true });
document.getElementById("lightboxImage").addEventListener("mousemove", followZoomCursor);

const updateNameDock = () => {
    document.body.classList.toggle("name-docked", window.scrollY > 80);
};

updateNameDock();
window.addEventListener("scroll", updateNameDock, { passive: true });

const portfolioItem = document.querySelector(".nav-item");
const portfolioButton = document.querySelector(".portfolio-trigger");

portfolioButton.addEventListener("click", (event) => {
    event.stopPropagation();
    const isOpen = portfolioItem.classList.toggle("menu-open");
    portfolioButton.setAttribute("aria-expanded", String(isOpen));
});

document.addEventListener("click", () => {
    portfolioItem.classList.remove("menu-open");
    portfolioButton.setAttribute("aria-expanded", "false");
});
</script>
</body>
</html>
