<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --page-bg: #faf9f7;
            --text: #1c1a17;
            --muted: #72685b;
            --line: rgba(28, 26, 23, 0.08);
            --shadow: 0 24px 60px rgba(62, 48, 26, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, #fff 0%, var(--page-bg) 30%, #f5f1eb 100%);
            overflow-x: hidden;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 40px;
            background: rgba(250, 249, 247, 0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--line);
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .nav-logo {
            font-weight: 600;
            letter-spacing: 1px;
            font-size: 1.1rem;
            text-transform: uppercase;
            color: var(--text);
            text-decoration: none;
        }

        .breadcrumb {
            font-size: 0.75rem;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--muted);
            margin-left: 20px;
            padding-left: 20px;
            border-left: 1px solid var(--line);
            white-space: nowrap;
        }

        .nav-right a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .nav-right a:hover {
            color: var(--text);
        }

        .page-header {
            margin-top: 100px;
            text-align: center;
            padding: 0 40px 60px;
        }

        .page-header h1 {
            font-family: "Playfair Display", serif;
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 500;
            margin: 0;
        }

        .page-header p {
            color: var(--muted);
            margin: 15px 0 0;
            max-width: 640px;
            margin-left: auto;
            margin-right: auto;
        }

        .gallery-shell {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px 100px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 20px;
            grid-auto-rows: 390px;
        }

        .gallery-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 20px rgba(62, 48, 26, 0.08);
            padding: 12px;
            box-sizing: border-box;
        }

        .gallery-item:hover {
            transform: scale(1.02);
        }

        .gallery-item-inner {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            overflow: hidden;
            background-color: #fff;
            border-radius: 4px;
        }

        .gallery-item-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0);
            display: flex;
            align-items: flex-end;
            padding: 20px;
            transition: background 0.4s ease, backdrop-filter 0.4s ease;
        }

        .gallery-item:hover .gallery-item-overlay {
            background: rgba(0, 0, 0, 0.35);
        }

        .gallery-item-title {
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.4s ease;
        }

        .gallery-item:hover .gallery-item-title {
            opacity: 1;
            transform: translateY(0);
        }

        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            overflow: hidden;
        }

        .lightbox.active {
            display: flex;
            flex-direction: column;
        }

        .lightbox-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .lightbox-title {
            color: rgba(255, 255, 255, 0.95);
            font-size: 1.1rem;
            margin: 0;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .lightbox-close {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            opacity: 0.8;
            transition: all 0.3s;
            padding: 8px 16px;
            border-radius: 6px;
            width: auto;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-close:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.25);
        }

        .lightbox-container {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 18px 12px;
            overflow: hidden;
            min-height: 0;
        }

        .lightbox-content {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .lightbox-main-photo {
            max-width: 98%;
            max-height: calc(100vh - 210px);
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
            animation: photoZoom 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(1px);
        }

        @keyframes photoZoom {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .lightbox-footer {
            padding: 18px 30px calc(18px + env(safe-area-inset-bottom, 14px));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.14);
            z-index: 2;
        }

        .lightbox-thumbnails {
            display: flex;
            gap: 8px;
            justify-content: flex-start;
            flex-wrap: nowrap;
            overflow-x: auto;
            margin-bottom: 8px;
            padding: 8px 8px 0;
            scroll-snap-type: x proximity;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x;
        }

        .lightbox-thumbnails::-webkit-scrollbar {
            height: 4px;
        }

        .lightbox-thumbnails::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 999px;
        }

        .lightbox-thumbnail {
            flex: 0 0 auto;
            width: 50px;
            height: 50px;
            scroll-snap-align: center;
            border: 1px solid transparent;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.4;
            background: rgba(255, 255, 255, 0.05);
            touch-action: pan-x;
            user-select: none;
        }

        .lightbox-thumbnail:hover {
            opacity: 0.8;
            transform: scale(1.08);
        }

        .lightbox-thumbnail.active {
            border-color: rgba(255, 255, 255, 0.8);
            opacity: 0.9;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }

        .lightbox-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .lightbox-side-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 52px;
            height: 52px;
            border: none;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
            color: rgba(255, 255, 255, 0.95);
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
            transition: transform 0.2s ease, background 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .lightbox-side-btn:hover {
            background: rgba(255, 255, 255, 0.28);
            transform: translateY(-50%) scale(1.05);
        }

        .lightbox-prev {
            left: 18px;
        }

        .lightbox-next {
            right: 18px;
        }

        @media (max-width: 1024px) {
            .gallery-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 15px;
                grid-auto-rows: 280px;
            }

            .page-header {
                padding: 0 20px 40px;
            }

            nav {
                padding: 15px 20px;
                flex-wrap: wrap;
                gap: 10px;
            }

            .breadcrumb {
                margin-left: 0;
                padding-left: 0;
                border-left: none;
                flex-basis: 100%;
            }

            .gallery-shell {
                padding: 0 20px 80px;
            }

            .lightbox-container {
                padding: 16px 14px calc(16px + env(safe-area-inset-bottom, 14px));
            }

            .lightbox-main-photo {
                max-width: 100%;
                max-height: calc(100vh - 185px);
                border-radius: 8px;
            }

            .lightbox-content {
                margin-bottom: 10px;
            }

            .lightbox-header {
                padding: 14px 16px;
            }

            .lightbox-footer {
                padding: 16px 18px calc(16px + env(safe-area-inset-bottom, 14px));
            }

            .lightbox-thumbnail {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>

    <div class="lightbox" id="lightbox">
        <div class="lightbox-header">
            <h2 class="lightbox-title" id="lightboxTitle">Strasbourg</h2>
            <button class="lightbox-close" id="lightboxClose">&times;</button>
        </div>
        <div class="lightbox-container">
            <button class="lightbox-side-btn lightbox-prev" onclick="previousPhoto();" aria-label="Previous photo">&#10094;</button>
            <div class="lightbox-content">
                <img id="lightboxMainPhoto" class="lightbox-main-photo" src="" alt="">
            </div>
            <button class="lightbox-side-btn lightbox-next" onclick="nextPhoto();" aria-label="Next photo">&#10095;</button>
        </div>
    </div>

    <script>
        let currentPhotos = [];
        let currentPhotoIndex = 0;

        const galleryItems = document.querySelectorAll('.gallery-item');
        const lightbox = document.getElementById('lightbox');
        const lightboxMainPhoto = document.getElementById('lightboxMainPhoto');
        const lightboxClose = document.getElementById('lightboxClose');

        function openLightbox(imageSrc) {
            currentPhotos = Array.from(document.querySelectorAll('.gallery-item')).map(item => item.dataset.image);
            currentPhotoIndex = currentPhotos.indexOf(imageSrc);
            displayPhoto(currentPhotoIndex);
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function displayPhoto(index) {
            if (index < 0 || index >= currentPhotos.length) return;
            currentPhotoIndex = index;
            lightboxMainPhoto.src = currentPhotos[index];
        }

        function nextPhoto() {
            currentPhotoIndex = (currentPhotoIndex + 1) % currentPhotos.length;
            displayPhoto(currentPhotoIndex);
        }

        function previousPhoto() {
            currentPhotoIndex = (currentPhotoIndex - 1 + currentPhotos.length) % currentPhotos.length;
            displayPhoto(currentPhotoIndex);
        }

        galleryItems.forEach((item) => {
            item.addEventListener('click', () => openLightbox(item.dataset.image));
        });

        lightboxClose.addEventListener('click', closeLightbox);

        lightbox.addEventListener('click', (event) => {
            if (event.target === lightbox) closeLightbox();
        });

        document.addEventListener('keydown', (event) => {
            if (!lightbox.classList.contains('active')) return;
            if (event.key === 'Escape') closeLightbox();
            if (event.key === 'ArrowRight') nextPhoto();
            if (event.key === 'ArrowLeft') previousPhoto();
        });
    </script>
