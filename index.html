<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irakli Korkia</title>

<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">

<style>
/* Sonia Goydenko inspired album layout - replace this file from git history to undo */
:root {
    --bg: #fff;
    --ink: #282828;
    --muted: #999;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html {
    scroll-behavior: smooth;
}

body {
    min-height: 100vh;
    overflow-x: hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: "Satoshi", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
}

a {
    color: inherit;
    text-decoration: none;
}

.site-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 20;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    min-height: 70px;
    padding: 23px 5%;
    background: rgba(255, 255, 255, 0.96);
}

.corner-name {
    color: var(--ink);
    font-size: 20px;
    font-weight: 900;
    line-height: 24px;
    text-transform: uppercase;
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.45s ease, transform 0.45s ease;
}

.nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    align-items: center;
    justify-content: flex-end;
    flex: 1 1 auto;
    margin-left: auto;
}

.nav a,
.portfolio-trigger {
    padding-right: 20px;
    color: var(--ink);
    background: transparent;
    border: 0;
    font-family: inherit;
    font-size: 20px;
    font-weight: 400;
    line-height: 24px;
    cursor: pointer;
}

.nav a:hover,
.nav a.active,
.portfolio-trigger:hover,
.nav-item:focus-within .portfolio-trigger,
.nav-item:hover .portfolio-trigger {
    font-weight: 700;
}

.nav-item {
    position: relative;
}

.album-dropdown {
    position: absolute;
    top: calc(100% + 12px);
    right: 20px;
    z-index: 40;
    min-width: 180px;
    padding: 12px 0;
    background: #fff;
    box-shadow: 0 10px 34px rgba(0, 0, 0, 0.09);
    opacity: 0;
    visibility: hidden;
    transform: translateY(-6px);
    transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s ease;
}

.nav-item:hover .album-dropdown,
.nav-item:focus-within .album-dropdown,
.nav-item.menu-open .album-dropdown {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.album-dropdown a {
    display: block;
    padding: 8px 16px;
    font-size: 17px;
    line-height: 22px;
    white-space: nowrap;
    transition: background-color 0.22s ease, color 0.22s ease, padding-left 0.22s ease, font-weight 0.22s ease;
}

.album-dropdown a:hover,
.album-dropdown a:focus {
    background: rgba(40, 40, 40, 0.04);
    padding-left: 22px;
    font-weight: 700;
}

.masthead {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 235px;
    padding: 118px 5% 34px;
    text-align: center;
}

.masthead-inner {
    max-width: 900px;
}

.masthead h1 {
    color: var(--ink);
    font-size: clamp(2rem, 7.2vw, 70px);
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0;
    text-transform: uppercase;
    transform-origin: center;
    transition: opacity 0.45s ease, transform 0.45s ease;
}

body.name-docked .masthead h1 {
    opacity: 0;
    transform: translate(-34vw, -84px) scale(0.34);
}

.masthead p {
    margin-top: 11px;
    color: var(--muted);
    font-size: clamp(0.95rem, 2.3vw, 24px);
    font-weight: 400;
    line-height: 1.18;
    text-transform: uppercase;
}

.site-container {
    max-width: 1480px;
    margin: 0 auto;
    padding: 0 0 70px;
}

.project-covers {
    display: flex;
    flex-wrap: wrap;
    gap: 28px;
    padding: 32px 3vw 0;
}

.project-cover {
    display: block;
    width: calc((100% - 56px) / 3);
    margin: 0;
    color: #fff;
}

.cover-content {
    position: relative;
    overflow: hidden;
}

.cover-image {
    position: relative;
    overflow: hidden;
}

.cover-image::before {
    content: "";
    display: block;
    width: 100%;
    padding-bottom: 92%;
}

.cover-image::after {
    display: none;
}

.cover-image img {
    position: absolute;
    top: 50%;
    left: 50%;
    width: calc(100% + 2px);
    height: calc(100% + 2px);
    object-fit: cover;
    transform: translate(-50%, -50%) scale(1.035);
    transition: transform 0.45s ease;
}

.details-wrap {
    padding-top: 9px;
}

.album-title {
    width: 100%;
    color: var(--ink);
    font-size: 20px;
    font-weight: 700;
    line-height: 24px;
    text-align: center;
}

.project-cover:hover .cover-image img {
    transform: translate(-50%, -50%) scale(1);
}

.back-to-top {
    display: block;
    margin-top: 26px;
    color: var(--ink);
    font-size: 15px;
    text-align: center;
}

@media (max-width: 932px) {
    .site-header {
        position: fixed;
        min-height: auto;
        padding: 18px 5%;
    }

    .corner-name,
    .nav a,
    .portfolio-trigger {
        font-size: 18px;
        line-height: 22px;
    }

    .album-dropdown {
        right: 14px;
    }

    .masthead {
        min-height: 190px;
        padding: 96px 5% 22px;
    }

    .project-covers {
        gap: 22px;
        padding-top: 24px;
    }

    .project-cover {
        width: calc((100% - 22px) / 2);
    }

    .album-title {
        font-size: 17px;
        line-height: 20px;
    }
}

@media (max-width: 700px) {
    .site-header {
        gap: 12px;
    }

    .nav {
        max-width: calc(100% - 132px);
    }

    .album-dropdown {
        right: 0;
        min-width: 164px;
    }
}

@media (max-width: 540px) {
    .site-header {
        align-items: flex-start;
        padding: 14px 5%;
    }

    .nav {
        row-gap: 8px;
        max-width: calc(100% - 112px);
    }

    .corner-name,
    .nav a,
    .portfolio-trigger {
        padding-right: 13px;
        font-size: 16px;
        line-height: 20px;
    }

    .corner-name {
        max-width: 100px;
    }

    .masthead {
        padding: 92px 5% 18px;
    }

    .masthead h1 {
        font-size: 30px;
        line-height: 30px;
    }

    .masthead p {
        font-size: 15px;
        line-height: 18px;
        margin-top: 8px;
    }

    .site-container {
        padding-bottom: 42px;
    }

    .project-covers {
        gap: 14px;
        padding-top: 20px;
    }

    .project-cover,
    .project-cover:nth-child(2n),
    .project-cover:nth-child(3n) {
        width: 100%;
    }

    .album-title {
        font-size: 14px;
        line-height: 17px;
    }
}
</style>
</head>

<body id="top">
<header class="site-header">
    <a href="index.html" class="corner-name" aria-label="Irakli Korkia home">Irakli Korkia</a>
    <nav class="nav" aria-label="Main navigation">
        <div class="nav-item">
            <button class="portfolio-trigger" type="button" aria-haspopup="true">Portfolio</button>
            <div class="album-dropdown" aria-label="Album navigation">
                <a href="album.html?album=strasbourg">STRASBOURG</a>
                <a href="album.html?album=catalonia">CATALONIA</a>
                <a href="album.html?album=andalusia">ANDALUSIA</a>
                <a href="album.html?album=corsica">CORSICA</a>
                <a href="album.html?album=french-alps">FRENCH ALPS</a>
            </div>
        </div>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="masthead" aria-label="Portfolio masthead">
    <div class="masthead-inner">
        <h1>Irakli Korkia</h1>
    </div>
</section>

<main class="site-container">
    <section class="project-covers" aria-label="Albums">
        <a class="project-cover" href="album.html?album=andalusia" aria-label="Open Andalusia album">
            <div class="cover-content">
                <div class="cover-image">
                    <img src="Photos/Andalusia/Andalusia_6.jpg" alt="Andalusia album cover">
                </div>
                <div class="details-wrap">
                    <div class="album-title">ANDALUSIA</div>
                </div>
            </div>
        </a>

        <a class="project-cover" href="album.html?album=catalonia" aria-label="Open Catalonia album">
            <div class="cover-content">
                <div class="cover-image">
                    <img src="Photos/Catalonia/Catalonia_18.jpg" alt="Catalonia album cover">
                </div>
                <div class="details-wrap">
                    <div class="album-title">CATALONIA</div>
                </div>
            </div>
        </a>

        <a class="project-cover" href="album.html?album=corsica" aria-label="Open Corsica album">
            <div class="cover-content">
                <div class="cover-image">
                    <img src="Photos/Corsica/Corsica_5.jpeg" alt="Corsica album cover">
                </div>
                <div class="details-wrap">
                    <div class="album-title">CORSICA</div>
                </div>
            </div>
        </a>

        <a class="project-cover" href="album.html?album=french-alps" aria-label="Open French Alps album">
            <div class="cover-content">
                <div class="cover-image">
                    <img src="Photos/French Alps/French_Alps_4.jpg" alt="French Alps album cover">
                </div>
                <div class="details-wrap">
                    <div class="album-title">FRENCH ALPS</div>
                </div>
            </div>
        </a>

        <a class="project-cover" href="album.html?album=strasbourg" aria-label="Open Strasbourg album">
            <div class="cover-content">
                <div class="cover-image">
                    <img src="Photos/Strasbourg/Strasbourg_13.jpg" alt="Strasbourg album cover">
                </div>
                <div class="details-wrap">
                    <div class="album-title">STRASBOURG</div>
                </div>
            </div>
        </a>
    </section>

    <a class="back-to-top" href="#top">↑ Back to Top</a>
</main>
<script>
const updateNameDock = () => {
    document.body.classList.toggle("name-docked", window.scrollY > 80);
};

updateNameDock();
window.addEventListener("scroll", updateNameDock, { passive: true });

const portfolioItem = document.querySelector(".nav-item");
const portfolioButton = document.querySelector(".portfolio-trigger");

portfolioButton.addEventListener("click", (event) => {
    event.stopPropagation();
    const isOpen = portfolioItem.classList.toggle("menu-open");
    portfolioButton.setAttribute("aria-expanded", String(isOpen));
});

document.addEventListener("click", () => {
    portfolioItem.classList.remove("menu-open");
    portfolioButton.setAttribute("aria-expanded", "false");
});
</script>
</body>
</html>
