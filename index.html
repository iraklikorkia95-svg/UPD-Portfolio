<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Irakli Korkia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,600&display=swap" rel="stylesheet">

<style>
:root {
    --page-bg: #faf9f7;
    --text: #1c1a17;
    --muted: #72685b;
    --line: rgba(28, 26, 23, 0.08);
    --shadow: 0 24px 60px rgba(62, 48, 26, 0.1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    min-height: 100%;
}

html {
    scroll-behavior: smooth;
}

body {
    overflow-x: hidden;
    font-family: "Satoshi", system-ui, -apple-system, sans-serif;
    color: var(--text);
    background: linear-gradient(180deg, #fff 0%, var(--page-bg) 30%, #f5f1eb 100%);
}

/* HEADER */
header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px clamp(20px, 4vw, 40px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    background: rgba(250, 249, 247, 0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    z-index: 100;
}

.logo {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
    white-space: nowrap;
}

.nav {
    display: flex;
    gap: clamp(14px, 3vw, 24px);
    align-items: center;
    flex-wrap: wrap;
    justify-content: flex-end;
}

.nav a {
    text-decoration: none;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: color 0.3s ease;
}

.nav a:hover {
    color: var(--text);
}

/* TOP QUESTION TEXT BLOCK */
.headline-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: clamp(14px, 3vw, 24px);
    max-width: 1400px;
    margin: clamp(104px, 14vw, 120px) auto 12px;
    padding: 0 clamp(20px, 4vw, 40px);
}

.headline-item {
    text-align: center;
    font-family: "Instrument Serif", serif;
    color: var(--text);
    font-size: clamp(1.4rem, 2.8vw, 1.95rem);
    line-height: 1.35;
    font-weight: 500;
    padding: 0 12px;
}

#question {
    max-width: 760px;
    margin: 0 auto 16px;
    text-align: center;
    padding: 0 24px;
    min-height: 3rem;
}

.line {
    font-family: "Instrument Serif", serif;
    color: var(--text);
    line-height: 1.4;
    letter-spacing: normal;
    font-size: clamp(1.7rem, 3.2vw, 2.2rem);
    font-weight: 500;
    min-height: 2.4rem;
}

.line.small {
    color: var(--muted);
    letter-spacing: 0.02em;
}

/* PANELS */
.container {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: clamp(16px, 3vw, 24px);
    padding: 30px clamp(20px, 4vw, 40px) 60px;
    max-width: 1400px;
    margin: 0 auto 60px;
}

.panel {
    position: relative;
    min-height: clamp(420px, calc(100vh - 270px), 760px);
    min-height: clamp(420px, calc(100svh - 270px), 760px);
    border-radius: clamp(14px, 2vw, 24px);
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    box-shadow: var(--shadow);
    transition: transform 0.35s ease, filter 0.35s ease;
    display: flex;
    align-items: flex-end;
    justify-content: center;
}

.container:hover .panel:not(:hover) {
    filter: blur(4px) brightness(0.7);
}

.panel:hover {
    transform: translateY(-6px);
    filter: none;
}

.panel::before {
    content: "";
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transform: scale(1.08);
    transition: transform 0.5s ease, filter 0.5s ease;
}

.panel:hover::before {
    transform: scale(1.14);
}

.container:hover .panel:not(:hover)::before {
    filter: blur(4px);
}

.panel::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(28, 26, 23, 0.35) 100%);
    pointer-events: none;
}

.label {
    position: relative;
    z-index: 2;
    margin-bottom: 42px;
    font-family: "Instrument Serif", serif;
    font-size: clamp(2.5rem, 6vw, 4.8rem);
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
}

.nature::before {
    background-image: url('Photos/Nature/Corsica/Corsica_5.jpeg');
}

.urban::before {
        background-image: url('Photos/Urban/Strasbourg/Strasbourg_13.jpg');
}

@media (max-width: 900px) {
    header {
        padding: 18px 24px;
        flex-wrap: wrap;
        gap: 12px;
    }

    .logo {
        font-size: 0.95rem;
    }

    .nav {
        gap: 16px;
    }

    .headline-grid {
        grid-template-columns: 1fr;
        margin-top: 110px;
    }

    .container {
        grid-template-columns: 1fr;
    }

    .panel {
        min-height: clamp(320px, 58vh, 520px);
        min-height: clamp(320px, 58svh, 520px);
    }

    .label {
        font-size: clamp(2rem, 10vw, 3.8rem);
        letter-spacing: 2px;
    }
}

@media (max-width: 520px) {
    header {
        align-items: flex-start;
        padding: 14px 18px;
    }

    .logo {
        font-size: 0.85rem;
    }

    .nav {
        width: 100%;
        justify-content: flex-start;
    }

    .nav a {
        font-size: 0.72rem;
    }

    .headline-grid {
        margin-top: 118px;
    }

    .headline-item {
        font-size: clamp(1.35rem, 8vw, 1.8rem);
        padding: 0;
    }

    #question {
        min-height: 2.4rem;
        padding: 0 18px;
    }

    .line {
        font-size: clamp(1.45rem, 8vw, 1.9rem);
        min-height: 2rem;
    }

    .container {
        padding-top: 18px;
        margin-bottom: 30px;
    }

    .panel {
        min-height: min(430px, 54vh);
        min-height: min(430px, 54svh);
    }
}

@media (hover: none) {
    .container:hover .panel:not(:hover),
    .container:hover .panel:not(:hover)::before {
        filter: none;
    }

    .panel:hover {
        transform: none;
    }
}

</style>
</head>

<body>

<header>
    <div class="logo">Irakli Korkia</div>

    <nav class="nav">
        <a href="#">Portfolio</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="headline-grid">
    <div class="headline-item" id="line1"></div>
    <div class="headline-item" id="line2"></div>
</div>

<div id="question">
    <div class="line small" id="line3"></div>
</div>

<div class="container">

    <a class="panel nature" href="nature.html">
        <div class="label">Nature</div>
    </a>

    <a class="panel urban" href="urban.html">
        <div class="label">Urban</div>
    </a>

</div>

<script>

/* split typing */
const text1 = "Some people belong to quiet landscapes.";
const text2 = "Others to restless cities.";
const text3 = "Where do you feel at home?";

let k = 0;

function typeLine3() {
    if (k < text3.length) {
        document.getElementById("line3").textContent += text3[k];
        k++;
        setTimeout(typeLine3, 55);
    }
}

document.getElementById("line1").textContent = text1;
document.getElementById("line2").textContent = text2;
typeLine3();

</script>

</body>
</html>
