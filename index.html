<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://api.fontshare.com">

<style>
/* Sonia Goydenko inspired album layout - replace this file from git history to undo */
:root {
    --bg: #e9e3d7;
    --surface: #f7f3ec;
    --ink: #26231f;
    --muted: #6f685d;
    --accent: #5f696e;
    --accent-warm: #b7795f;
    --hover: rgba(95, 105, 110, 0.12);
    --shadow: rgba(38, 35, 31, 0.16);
    --display: "Clash Display", "Satoshi", "Helvetica Neue", Arial, sans-serif;
    --body: "Satoshi", "Helvetica Neue", Arial, sans-serif;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html {
    scroll-behavior: smooth;
}

body {
    min-height: 100vh;
    overflow-x: hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--body);
    -webkit-font-smoothing: antialiased;
}

a {
    color: inherit;
    text-decoration: none;
}

.site-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 20;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    min-height: 70px;
    padding: 23px 5%;
    background: rgba(233, 227, 215, 0.93);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(38, 35, 31, 0.08);
}

.corner-name {
    color: var(--ink);
    font-family: var(--display);
    font-size: 20px;
    font-weight: 700;
    line-height: 24px;
    text-transform: uppercase;
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.45s ease, transform 0.45s ease;
}

.nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    align-items: center;
    justify-content: flex-end;
    flex: 1 1 auto;
    margin-left: auto;
}

.nav a,
.portfolio-trigger {
    padding-right: 20px;
    color: var(--ink);
    background: transparent;
    border: 0;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    line-height: 20px;
    text-transform: uppercase;
    cursor: pointer;
}

.nav a:hover,
.nav a.active,
.portfolio-trigger:hover,
.nav-item:focus-within .portfolio-trigger,
.nav-item:hover .portfolio-trigger {
    color: var(--accent-warm);
    font-weight: 700;
}

.nav-item {
    position: relative;
}

.album-dropdown {
    position: absolute;
    top: calc(100% + 12px);
    right: 20px;
    z-index: 40;
    min-width: 180px;
    padding: 12px 0;
    background: var(--surface);
    border-top: 2px solid var(--accent);
    box-shadow: 0 10px 34px var(--shadow);
    opacity: 0;
    visibility: hidden;
    transform: translateY(-6px);
    transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s ease;
}

.nav-item:hover .album-dropdown,
.nav-item:focus-within .album-dropdown,
.nav-item.menu-open .album-dropdown {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.album-dropdown a {
    display: block;
    padding: 9px 16px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    line-height: 18px;
    white-space: nowrap;
    transition: background-color 0.22s ease, color 0.22s ease, padding-left 0.22s ease, font-weight 0.22s ease;
}

.album-dropdown a:hover,
.album-dropdown a:focus {
    background: var(--hover);
    color: var(--ink);
    padding-left: 22px;
    font-weight: 700;
}

.masthead {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 235px;
    padding: 118px 5% 34px;
    text-align: center;
}

.masthead-inner {
    max-width: 900px;
}

.masthead h1 {
    color: var(--ink);
    font-family: var(--display);
    font-size: clamp(2rem, 7.2vw, 70px);
    font-weight: 700;
    line-height: 1;
    letter-spacing: 0;
    text-transform: uppercase;
    transform-origin: center;
    transition: opacity 0.45s ease, transform 0.45s ease;
}

body.name-docked .masthead h1 {
    opacity: 0;
    transform: translate(-34vw, -84px) scale(0.34);
}

.masthead p {
    margin-top: 11px;
    color: var(--muted);
    font-size: clamp(0.95rem, 2.3vw, 24px);
    font-weight: 400;
    line-height: 1.18;
    text-transform: uppercase;
}

.site-container {
    max-width: 1480px;
    margin: 0 auto;
    padding: 0 0 70px;
}

.project-covers {
    display: flex;
    flex-wrap: wrap;
    gap: 28px;
    padding: 32px 3vw 0;
}

.project-cover {
    display: block;
    width: calc((100% - 56px) / 3);
    margin: 0;
    color: var(--ink);
}

.cover-content {
    position: relative;
    overflow: hidden;
}

.cover-image {
    position: relative;
    overflow: hidden;
    box-shadow: 0 14px 34px rgba(38, 35, 31, 0.11);
}

.cover-image::before {
    content: "";
    display: block;
    width: 100%;
    padding-bottom: 92%;
}

.cover-image::after {
    display: none;
}

.cover-image img {
    position: absolute;
    top: 50%;
    left: 50%;
    width: calc(100% + 2px);
    height: calc(100% + 2px);
    object-fit: cover;
    transform: translate(-50%, -50%) scale(1.035);
    filter: saturate(0.96) contrast(1.02);
    transition: filter 0.45s ease, transform 0.45s ease;
}

.details-wrap {
    padding-top: 9px;
}

.album-title {
    width: 100%;
    color: var(--ink);
    font-size: 13px;
    font-weight: 700;
    line-height: 18px;
    text-align: center;
    text-transform: uppercase;
    transition: color 0.22s ease;
}

.project-cover:hover .cover-image img {
    filter: saturate(1.03) contrast(1.04);
    transform: translate(-50%, -50%) scale(1.012);
}

.project-cover:hover .album-title {
    color: var(--accent-warm);
}

.back-to-top {
    display: block;
    margin-top: 26px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    text-transform: uppercase;
    transition: color 0.22s ease;
}

.back-to-top:hover {
    color: var(--accent-warm);
}

@media (max-width: 932px) {
    .site-header {
        position: fixed;
        min-height: auto;
        padding: 18px 5%;
    }

    .corner-name {
        font-size: 18px;
        line-height: 22px;
    }

    .nav a,
    .portfolio-trigger {
        font-size: 14px;
        line-height: 18px;
    }

    .album-dropdown {
        right: 14px;
    }

    .masthead {
        min-height: 190px;
        padding: 96px 5% 22px;
    }

    .project-covers {
        gap: 22px;
        padding-top: 24px;
    }

    .project-cover {
        width: calc((100% - 22px) / 2);
    }

    .album-title {
        font-size: 17px;
        line-height: 20px;
    }
}

@media (max-width: 700px) {
    .site-header {
        gap: 12px;
    }

    .nav {
        max-width: calc(100% - 132px);
    }

    .album-dropdown {
        right: 0;
        min-width: 164px;
    }
}

@media (max-width: 540px) {
    .site-header {
        align-items: flex-start;
        padding: 14px 5%;
    }

    .nav {
        row-gap: 8px;
        max-width: calc(100% - 112px);
    }

    .corner-name {
        padding-right: 13px;
        font-size: 16px;
        line-height: 20px;
    }

    .nav a,
    .portfolio-trigger {
        padding-right: 13px;
        font-size: 13px;
        line-height: 17px;
    }

    .corner-name {
        max-width: 100px;
    }

    .masthead {
        padding: 92px 5% 18px;
    }

    .masthead h1 {
        font-size: 30px;
        line-height: 30px;
    }

    .masthead p {
        font-size: 15px;
        line-height: 18px;
        margin-top: 8px;
    }

    .site-container {
        padding-bottom: 42px;
    }

    .project-covers {
        gap: 14px;
        padding-top: 20px;
    }

    .project-cover,
    .project-cover:nth-child(2n),
    .project-cover:nth-child(3n) {
        width: 100%;
    }

    .album-title {
        font-size: 14px;
        line-height: 17px;
    }
}

/* Theo Gosselin inspired portfolio treatment */

    --bg: #f4eadb;
    --surface: #fff8ec;

    --accent: #ed8374;

body {

    line-height: 1.5;
}

.album-title {
    background: var(--bg);
}

.site-header {
    position: fixed;
    top: 80px;
    left: 60px;
    right: auto;
    bottom: auto;

}

.corner-name {

}

.corner-name:hover,

}

.nav {
    display: block;
    margin: 0;

}

.nav a,
.portfolio-trigger {

    font-weight: 400;

.album-dropdown {

}

.album-dropdown a {

    font-family: var(--body);

}

.album-dropdown a:hover,
.album-dropdown a:focus {

}

.masthead {
    display: none;
}

.site-container {
    width: calc(100% - 250px);

    display: grid;

    padding: 0;
}

.project-cover,
.project-cover:nth-child(2n),
.project-cover:nth-child(3n) {
    width: 100%;

    transform-origin: center top;

}

.cover-content,
.cover-image {

}

.cover-image {
    box-shadow: none;

}

.cover-image::before {
    padding-bottom: 34%;
}

.cover-image img {
    transform: translate(-50%, -50%) scale(1);
    filter: none;
    transition: none;
}

.details-wrap {
    padding-top: 7px;
}

    color: #444444;
    background: var(--bg);
    font-family: Georgia, serif;

    font-weight: 700;

    text-align: left;
    text-transform: none;
    transition: none;
}

.project-cover:hover .cover-image {
    opacity: 1;
}

.project-cover:hover {
    transform: scale(1.018);
}

.project-cover:hover .cover-image img {
    filter: none;
    transform: translate(-50%, -50%) scale(1);
}

.project-cover:hover .album-title {
    color: #444444;
}

.back-to-top {
    display: none;
}

@media (max-width: 75em) {
    .site-header {
        left: 40px;
        width: 140px;
    }

    .site-container {
        width: calc(100% - 215px);
        margin-left: 255px;
        margin-right: 40px;
    }
}

@media (max-width: 45em) {
    .site-header {
        position: static;
        width: 90%;
        margin: 0 auto 4em;
        padding-top: 3em;
    }

    .corner-name {
        margin-bottom: 24px;
        max-width: none;

        line-height: 1.2;

    }

</style>
</head>

<body id="top">
<header class="site-header">

<main class="site-container">

                </div>

<script>
const updateNameDock = () => {
    document.body.classList.toggle("name-docked", window.scrollY > 80);
};

updateNameDock();
window.addEventListener("scroll", updateNameDock, { passive: true });

const portfolioItem = document.querySelector(".nav-item");
const portfolioButton = document.querySelector(".portfolio-trigger");

portfolioButton.addEventListener("click", (event) => {
    event.stopPropagation();
    const isOpen = portfolioItem.classList.toggle("menu-open");
    portfolioButton.setAttribute("aria-expanded", String(isOpen));
});

document.addEventListener("click", () => {
    portfolioItem.classList.remove("menu-open");
    portfolioButton.setAttribute("aria-expanded", "false");
});
</script>
